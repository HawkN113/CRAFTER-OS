<svg width="800" height="700" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box {
      fill: #0f172a;
      stroke: #38bdf8;
      stroke-width: 2;
      rx: 14;
    }
    .text {
      fill: #e2e8f0;
      font-family: Arial, sans-serif;
      font-size: 16px;
      text-anchor: middle;
    }
    .title {
      fill: #38bdf8;
      font-size: 18px;
      font-weight: bold;
    }
    .arrow {
      stroke: #94a3b8;
      stroke-width: 2;
      marker-end: url(#arrowhead);
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"></polygon>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="40" class="title">CRAFTER OS Architecture</text>

  <!-- Boxes -->
  <rect x="250" y="70" width="300" height="60" class="box"></rect>
  <text x="400" y="105" class="text">Engineering Culture</text>

  <rect x="250" y="160" width="300" height="60" class="box"></rect>
  <text x="400" y="195" class="text">Playbook (Execution)</text>

  <rect x="250" y="250" width="300" height="60" class="box"></rect>
  <text x="400" y="285" class="text">Metrics (Measurement)</text>

  <rect x="250" y="340" width="300" height="60" class="box"></rect>
  <text x="400" y="375" class="text">Self-Assessment (Feedback)</text>

  <rect x="250" y="430" width="300" height="60" class="box"></rect>
  <text x="400" y="465" class="text">Iteration (Improvement)</text>

  <rect x="250" y="520" width="300" height="60" class="box"></rect>
  <text x="400" y="555" class="text">Anti-Fragile System</text>

  <!-- Arrows -->
  <line x1="400" y1="130" x2="400" y2="160" class="arrow"></line>
  <line x1="400" y1="220" x2="400" y2="250" class="arrow"></line>
  <line x1="400" y1="310" x2="400" y2="340" class="arrow"></line>
  <line x1="400" y1="400" x2="400" y2="430" class="arrow"></line>
  <line x1="400" y1="490" x2="400" y2="520" class="arrow"></line>

  <!-- Loop Arrow -->
  <path d="M 550 550 C 700 550, 700 100, 550 100" fill="none" class="arrow"></path>

  <text x="680" y="330" class="text" transform="rotate(90 680,330)">
    Continuous Feedback Loop
  </text>
</svg>